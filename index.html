    <main class="bookshelf-container">
        <!-- Shelf 1 -->
        <div class="shelf">
            <div class="book" data-color="pastel-blue" onclick="handleBookClick(this, 'story_p')">
                <div class="book-spine">
                    <span class="book-title">P에 대하여</span>
                </div>
                <div class="book-cover">
                    <div class="cover-content">
                        <h3>P에<br>대하여</h3>
                        <p class="author">단편소설</p>
                    </div>
                </div>
            </div>
            <div class="book" data-color="pastel-pink" onclick="handleBookClick(this, 'story2')">
                <div class="book-spine">
                    <span class="book-title">그랜마정미</span>
                </div>
                <div class="book-cover">
                    <div class="cover-content">
                        <h3>그랜마<br>정미</h3>
                        <p class="author">단편소설</p>
                    </div>
                </div>
            </div>
            <div class="book" data-color="pastel-green" onclick="handleBookClick(this, 'story3')">
                <div class="book-spine">
                    <span class="book-title">기억의 조각들</span>
                </div>
                <div class="book-cover">
                    <div class="cover-content">
                        <h3>기억의<br>조각들</h3>
                        <p class="author">에세이</p>
                    </div>
                </div>
            </div>

            <div class="decor-plant"></div>
        </div>

        <!-- Shelf 2 -->
        <div class="shelf">
            <div class="book" data-color="pastel-yellow" onclick="handleBookClick(this, 'story4')">
                <div class="book-spine">
                    <span class="book-title">달빛 산책</span>
                </div>
                <div class="book-cover">
                    <div class="cover-content">
                        <h3>달빛<br>산책</h3>
                        <p class="author">단편소설</p>
                    </div>
                </div>
            </div>
            <div class="book" data-color="pastel-beige" onclick="handleBookClick(this, 'story5')">
                <div class="book-spine">
                    <span class="book-title">첫눈이 오면</span>
                </div>
                <div class="book-cover">
                    <div class="cover-content">

    <div id="book-modal" class="modal" hidden>
        <div class="modal-content">
            <!-- Animation Pages -->
            <div class="flip-page"></div>
            <div class="flip-page"></div>
            <div class="flip-page"></div>
            <div class="flip-page"></div>
            <div class="flip-page"></div>

            <button class="close-btn" onclick="closeBook()">&times;</button>

            <div class="story-container" id="story-container">
                <h2 id="modal-title">제목</h2>
                <div id="modal-body" class="story-text">
                    <!-- Story content goes here -->
                </div>
            </div>

            <!-- Navigation Controls -->
            <div class="book-nav">
                <button id="prev-btn" class="nav-btn" onclick="changePage(-1)">&#10094;</button>
                <span id="page-indicator">1 / 1</span>
                <button id="next-btn" class="nav-btn" onclick="changePage(1)">&#10095;</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="settings-overlay" hidden>
        <div class="settings-panel">
            <div class="settings-header">
                <h3>설정</h3>
                <button class="settings-close-btn" onclick="toggleSettings()">&times;</button>
            </div>
            <div class="settings-body">
                <div class="settings-item">
                    <div class="settings-item-row">
                        <span class="settings-label">효과음</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="sfx-toggle" checked onchange="onSfxToggle(this.checked)">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="settings-item-row volume-row" id="sfx-volume-row">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M15.54 8.46a5 5 0 010 7.07"/>
                            <path d="M19.07 4.93a10 10 0 010 14.14"/>
                        </svg>
                        <input type="range" id="sfx-volume" min="0" max="100" value="70" oninput="onSfxVolume(this.value)">
                        <span id="sfx-volume-label" class="volume-label">70%</span>
                    </div>
                </div>
                <hr class="settings-divider">
                <div class="settings-item">
                    <span class="settings-label">종이 스킨</span>
                    <div class="skin-picker" id="skin-picker">
                        <button class="skin-swatch" data-skin="cream" onclick="setPaperSkin('cream')" title="크림">
                            <span class="swatch-color" style="background:#FDF8EE;"></span>
                            <span class="swatch-name">크림</span>
                        </button>
                        <button class="skin-swatch" data-skin="aged" onclick="setPaperSkin('aged')" title="빛바랜 종이">
                            <span class="swatch-color" style="background:#F5ECD7;"></span>
                            <span class="swatch-name">빛바랜</span>
                        </button>
                        <button class="skin-swatch" data-skin="white" onclick="setPaperSkin('white')" title="화이트">
                            <span class="swatch-color" style="background:#FFFFFF; border:1px solid #ddd;"></span>
                            <span class="swatch-name">화이트</span>
                        </button>
                        <button class="skin-swatch" data-skin="parchment" onclick="setPaperSkin('parchment')" title="양피지">
                            <span class="swatch-color" style="background:#E8D5B7; border-radius:40% 30% 45% 25% / 30% 40% 35% 45%;"></span>
                            <span class="swatch-name">양피지</span>
                        </button>
                        <button class="skin-swatch" data-skin="dark" onclick="setPaperSkin('dark')" title="다크">
                            <span class="swatch-color" style="background:#2A2520;"></span>
                            <span class="swatch-name">다크</span>
                        </button>
                        <button class="skin-swatch" data-skin="night" onclick="setPaperSkin('night')" title="야간">
                            <span class="swatch-color" style="background:#1A2332;"></span>
                            <span class="swatch-name">야간</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
